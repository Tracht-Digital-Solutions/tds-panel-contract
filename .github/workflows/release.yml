name: Release (manual → GitHub Packages @latest)

# Production release, ONLY on the manual button. Bumps the version in BOTH
# package.json and composer.json (lockstep), builds, publishes the npm half to
# GitHub Packages, and pushes the version-bump commit + tag back to main - the
# tag is also the Composer half's release ref. Pipeline body in _build.yml.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_build.yml
    with:
      publish_tag: latest
      bump: ${{ inputs.bump }}
    secrets: inherit
