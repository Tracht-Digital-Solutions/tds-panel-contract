name: Build (reusable)

# Single source of truth for panel-contract. Called by ci.yml (PR gate, no
# publish), dev.yml (prerelease -> @dev dist-tag) and release.yml (version bump
# -> @latest + push tag). Behaviour selected via the inputs below.
#
# panel-contract is a DUAL package: the TypeScript half publishes to GitHub
# Packages (npm); the PHP half is a Composer package consumed via a VCS repo, so
# its "release" IS the git tag pushed here - no separate registry publish. Both
# test suites gate every run.

on:
  workflow_call:
    inputs:
      publish_tag:
        description: "none = build only (CI); 'dev' = prerelease @dev; 'latest' = real release."
        required: false
        type: string
        default: none
      bump:
        description: Version bump for a 'latest' release (patch | minor | major).
        required: false
        type: string
        default: patch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No `permissions:` block here - a reusable workflow cannot request more than
    # the caller's token holds, and the repo default is read-only. Each caller
    # grants least-privilege permissions instead.
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PACKAGE_TOKEN }}

      # --- PHP half: Module contract + ModuleRegistry unit tests --------------
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Composer validate
        run: composer validate --no-check-publish --no-check-lock

      - name: Composer install
        uses: ramsey/composer-install@v3

      - name: PHP syntax check
        run: |
          find php/src php/tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: PHPUnit
        run: composer test

      # --- TypeScript half: manifest types + composition helpers --------------
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tracht-digital-solutions'

      - name: Install
        # NOT `npm ci` + a committed lockfile: a Windows-generated package-lock
        # pins only the win32 rollup/esbuild optional binaries, so `npm ci` on
        # the Linux runner dies with "Cannot find module @rollup/rollup-linux-
        # x64-gnu" (npm optional-deps bug #4828). The project convention is
        # `npm install --no-package-lock` — resolves fresh per-platform. (No
        # `cache: npm` above for the same reason: it needs a lockfile.)
        run: npm install --no-package-lock

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      # --- Publish -----------------------------------------------------------
      - name: Publish prerelease (@dev)
        if: ${{ inputs.publish_tag == 'dev' }}
        run: |
          base=$(node -p "require('./package.json').version")
          npm version "${base}-dev.${{ github.run_number }}" --no-git-tag-version
          npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Release (@latest) + push tag
        # Bumps package.json AND composer.json in lockstep (the two halves are
        # one release), commits both, tags, publishes npm, and pushes the tag -
        # which is also the Composer package's release ref.
        if: ${{ inputs.publish_tag == 'latest' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          new=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          node -e "const f='composer.json',j=require('./'+f);j.version='${new}'.replace(/^v/,'');require('fs').writeFileSync(f, JSON.stringify(j,null,2)+'\n')"
          git add package.json composer.json
          git commit -m "release: ${new}"
          # Annotated tag (-a): `git push --follow-tags` pushes ONLY annotated
          # tags — a lightweight `git tag ${new}` would never reach the remote,
          # so Composer (which resolves this package by VCS tag) would never see
          # the release.
          git tag -a "${new}" -m "release ${new}"
          npm publish
          git push --follow-tags origin HEAD:main
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Prune old release tags (keep newest 5)
        if: ${{ inputs.publish_tag == 'latest' }}
        run: |
          git fetch --tags --force --quiet
          old=$(git tag --sort=-v:refname | tail -n +6)
          if [ -z "$old" ]; then
            echo "5 or fewer tags - nothing to prune."
            exit 0
          fi
          echo "Pruning $(echo "$old" | wc -l | tr -d ' ') old tag(s):"
          echo "$old"
          for t in $old; do
            git push origin ":refs/tags/$t"
          done

      # --- GitHub Packages version retention ---------------------------------
      - name: Prune old prerelease package versions (keep newest 5)
        continue-on-error: true  # best-effort housekeeping; needs delete:packages
        if: ${{ inputs.publish_tag != 'none' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: tds-panel-contract
          package-type: npm
          min-versions-to-keep: 5
          delete-only-pre-release-versions: 'true'
          token: ${{ secrets.PACKAGE_TOKEN }}

      - name: Prune old stable package versions (keep newest 10)
        continue-on-error: true  # best-effort housekeeping; needs delete:packages
        if: ${{ inputs.publish_tag == 'latest' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: tds-panel-contract
          package-type: npm
          min-versions-to-keep: 10
          ignore-versions: '^.*-.*$'
          token: ${{ secrets.PACKAGE_TOKEN }}
